{% load i18n grp_tags %}
{% if cl.search_fields %}
    <!-- Search Form -->
    <form id="grp-changelist-search-form" action="" method="get">
        <input type="text" name="{{ search_var }}" id="grp-changelist-search" class="grp-search-field" value="{{ cl.query }}" />
        <button type="submit" value="" class="grp-search-button" style="background-color:#0E76C9;border:1px solid #0E76C9;border-radius:8px;"><i class="fa fa-search" style="color:#fff;"></i></button>
        {% for pair in cl.params.items %}
            {% ifnotequal pair.0 search_var %}<input type="hidden" name="{{ pair.0 }}" value="{{ pair.1 }}"/>{% endifnotequal %}
        {% endfor %}
    </form>
{% endif %}
